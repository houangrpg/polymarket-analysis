<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JoeClawSite — Monitoring Dashboard (Prototype)</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root{--bg:#0b1020;--card:#0f1724;--muted:#9aa4b2;--accent:#4dd0e1;--glass: rgba(255,255,255,0.02)}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#071026 0%,#071522 100%);color:#e6eef6;margin:0;padding:24px}
    h1{margin:0 0 8px;font-size:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .card{background:var(--card);padding:12px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.4);min-height:100px}
    .muted{color:var(--muted);font-size:13px}
    .kpi{font-size:18px;font-weight:600}
    .row{display:flex;gap:12px;align-items:center}
    canvas{max-width:100%;height:70px}
    pre{white-space:pre-wrap;color:var(--muted);font-size:13px;max-height:220px;overflow:auto;padding:8px;border-radius:6px;background:rgba(255,255,255,0.01)}
    footer{margin-top:18px;color:var(--muted);font-size:13px}
    .service-up{color:#7ef085}
    .service-down{color:#ff7b7b}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<script id="embedded-status" type="application/json">{
  "current_task": "Maintenance (2026-02-23)",
  "step": "complete",
  "step_detail": "All steps finished; monitor 24-48h",
  "progress": 100.0,
  "last_status": "ok",
  "recent_logs": [
    {
      "ts": 1771809890640,
      "msg": "Maintenance complete: OpenClaw update, fixes, driver reinstall, reboot, audit, website fix"
    },
    {
      "ts": 1771809882666,
      "msg": "Fixed category view; merged to main and pushed"
    },
    {
      "ts": 1771809874568,
      "msg": "Security audit completed; 1 warn"
    },
    {
      "ts": 1771809866454,
      "msg": "Rebooted; nvidia driver active"
    },
    {
      "ts": 1771809750003,
      "msg": "Reinstalled nvidia-driver-535"
    },
    {
      "ts": 1771809741708,
      "msg": "Blacklisted nouveau and updated initramfs"
    },
    {
      "ts": 1771809732979,
      "msg": "Upgraded npm to 11.10.1"
    },
    {
      "ts": 1771809724787,
      "msg": "Doctor: removed 4 stale session locks"
    },
    {
      "ts": 1771809716841,
      "msg": "Updated openclaw 2026.2.9 -> 2026.2.21-2"
    },
    {
      "ts": 1771809406741,
      "msg": "deployed status-ui"
    }
  ],
  "updated": 1771812955780
}</script>

  <header>
    <h1>JoeClawSite — Monitoring Dashboard (Prototype)</h1>
    <div class="muted">Live snapshot from <code>/status.json</code></div>
  </header>

  <main style="margin-top:16px">
    <div class="grid">
      <div class="card">
        <div class="muted">System</div>
        <div id="sys_uptime" class="kpi">--</div>
        <div id="sys_kernel" class="muted">--</div>
      </div>

      <div class="card">
        <div class="muted">CPU / Memory</div>
        <div class="row">
          <div style="flex:1">
            <div class="muted">CPU %</div>
            <canvas id="cpuChart" width="300" height="70"></canvas>
          </div>
          <div style="flex:1">
            <div class="muted">Memory %</div>
            <canvas id="memChart" width="300" height="70"></canvas>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="muted">Disk</div>
        <div id="disk_info" class="kpi">--</div>
        <canvas id="diskChart" width="300" height="70"></canvas>
      </div>

      <div class="card">
        <div class="muted">Services</div>
        <div id="services_list" style="margin-top:8px"></div>
      </div>

      <div class="card" style="grid-column: span 2;">
        <div class="muted">Recent maintenance logs</div>
        <pre id="maintenance_logs">loading…</pre>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;"><div class="muted">Raw snapshot</div><button id="toggle_raw" style="background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted);padding:6px;border-radius:6px;cursor:pointer">Toggle raw</button></div>
        <pre id="raw_json" style="display:none">loading…</pre>
      </div>

    </div>

    <footer>
      Prototype — auto-generated. For production, wire secure endpoints and history storage.
    </footer>
  </main>

<script>
async function fetchStatus(){
  // Try multiple locations and provide a graceful fallback
  async function tryFetch(url){
    try{
      const r = await fetch(url, {cache: 'no-store'});
      if(!r.ok) throw new Error(url+' fetch failed: '+r.status);
      return await r.json();
    }catch(e){
      console.debug('tryFetch failed',url,e);
      return null;
    }
  }
  let j = await tryFetch('status.json');
  if(!j) j = await tryFetch('public/status.json');
  if(!j) j = await tryFetch('/public/status.json');
  if(!j){
    // try embedded JSON
    const embed = document.getElementById('embedded-status');
    if(embed){
      try{ j = JSON.parse(embed.textContent); }
      catch(e){ console.debug('embedded status parse failed',e); }
    }
  }
  if(!j){
    // fallback sample to avoid blank page
    j = {
      system:{uptime:'n/a', kernel: 'n/a'},
      cpu:{usage:0, history:[0,0,0,0]},
      memory:{used_pct:0, history:[0,0,0,0]},
      disk:{used_pct:0, mounts:[] , history:[0,0,0,0]},
      services:{openclaw:{ok:true,msg:'using fallback'}},
      maintenance:[]
    };
    // show small visible notice
    const notice = document.createElement('div');
    notice.style.background='rgba(255,120,80,0.08)';
    notice.style.border='1px solid rgba(255,120,80,0.15)';
    notice.style.padding='8px';
    notice.style.borderRadius='6px';
    notice.style.marginBottom='8px';
    notice.innerText = 'Note: status.json not found on server. Displaying fallback data.';
    document.querySelector('main').insertBefore(notice, document.querySelector('main').firstChild);
  }
  return j;
}

function normalizeStatus(j){
  // Convert older status.json shapes into expected keys
  if(!j) return j;
  const out = {};
  // system
  out.system = {uptime: j.uptime || j.uptime_str || (j.updated? new Date(j.updated).toString() : 'n/a'), kernel: j.kernel || j.sys_kernel || ''};
  // cpu/memory/disk defaults
  out.cpu = j.cpu || {usage:0, history: (j.cpu&&j.cpu.history)? j.cpu.history : [0,0,0,0]};
  out.memory = j.memory || {used_pct: (j.memory&&j.memory.used_pct)? j.memory.used_pct : 0, history: (j.memory&&j.memory.history)? j.memory.history : [0,0,0,0]};
  out.disk = j.disk || {used_pct: (j.disk&&j.disk.used_pct)? j.disk.used_pct : 0, mounts: (j.disk&&j.disk.mounts)? j.disk.mounts : [], history: (j.disk&&j.disk.history)? j.disk.history : [0,0,0,0]};
  // services
  out.services = {};
  if(j.services){ out.services = j.services }
  else if(j.last_status || j.current_task){ out.services.openclaw = {ok: (j.last_status=='ok' || j.last_status==true), msg: j.current_task || ''} }
  // maintenance logs
  if(j.maintenance) out.maintenance = j.maintenance; else if(j.recent_logs) out.maintenance = j.recent_logs.map(x=>({ts:x.ts||x.t, msg:x.msg||x.message||JSON.stringify(x)})); else out.maintenance = [];
  return out;
}

function short(n){return (Math.round(n*10)/10).toString()}

function render(k){
  document.getElementById('raw_json').textContent = JSON.stringify(k,null,2);
  const sys = k.system || {};
  document.getElementById('sys_uptime').textContent = sys.uptime || sys.uptime_str || '--';
  document.getElementById('sys_kernel').textContent = sys.kernel || '';

  // CPU chart
  const cpu = k.cpu || {usage:0};
  const mem = k.memory || {used_pct:0};
  const disk = k.disk || {used_pct:0, mounts:[]};

  drawSpark('cpuChart', cpu.history || [cpu.usage||0]);
  drawSpark('memChart', mem.history || [mem.used_pct||0]);
  drawSpark('diskChart', disk.history || [disk.used_pct||0]);

  // disk info
  document.getElementById('disk_info').textContent = (disk.used_pct ? disk.used_pct+'% used' : '--') + (disk.mounts&&disk.mounts.length? '  '+(disk.mounts[0].mount || '') : '');

  // services
  const servicesEl = document.getElementById('services_list');
  servicesEl.innerHTML = '';
  const sv = k.services || {};
  for(const name of Object.keys(sv)){
    const s = sv[name];
    const el = document.createElement('div');
    el.innerHTML = `<strong>${name}</strong>: <span class="${s.ok? 'service-up':'service-down'}">${s.ok? 'up':'down'}</span> ${s.msg? '- '+s.msg : ''}`;
    servicesEl.appendChild(el);
  }

  // maintenance logs
  const m = k.maintenance || [];
  const logs = m.slice(-8).reverse().map(x=>`[${x.t || x.ts || 'n/a'}] ${x.msg || JSON.stringify(x)}`); document.getElementById('maintenance_logs').textContent = logs.join('\n') || 'no logs';
}

function drawSpark(id, values){
  const ctx = document.getElementById(id).getContext('2d');
  if(window[id+'_chart']){window[id+'_chart'].data.labels = values.map((_,i)=>i);window[id+'_chart'].data.datasets[0].data = values;window[id+'_chart'].update();return}
  window[id+'_chart'] = new Chart(ctx, {
    type:'line',
    data:{labels:values.map((_,i)=>i),datasets:[{data:values,borderColor:'#4dd0e1',backgroundColor:'rgba(77,208,225,0.08)',fill:true,tension:0.3,pointRadius:0}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{x:{display:false},y:{display:false}},plugins:{legend:{display:false},tooltip:{enabled:false}}}
  });
}

async function init(){
  const s = await fetchStatus();
  if(!s){ document.getElementById('raw_json').textContent='status.json unavailable'; return }
  const norm = normalizeStatus(s);
  render(norm);
}

init();

document.getElementById('toggle_raw').addEventListener('click',()=>{const r=document.getElementById('raw_json');r.style.display=(r.style.display==='none')?'block':'none'});</script>
</body>
</html>
